################################################################################
# PlaceOpt 운영 콘솔 — Nginx 배포 설정
#
# 구성:
#   - 프론트엔드 정적 파일 서빙 (포트 80/443)
#   - BrowserRouter SPA fallback (try_files → index.html)
#   - 백엔드 API 프록시 (/api/v1/* → :8000)
#   - 보안 헤더
#
# 사용법:
#   cp deploy/nginx.conf /etc/nginx/sites-available/placeopt
#   ln -s /etc/nginx/sites-available/placeopt /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
################################################################################

server {
    listen 80;
    server_name your-domain.com;   # ← 도메인으로 교체
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name your-domain.com;   # ← 도메인으로 교체

    # SSL 인증서 (Let's Encrypt 예시)
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # 프론트엔드 빌드 결과물 경로
    root /home/user/placeopt/frontend/dist;
    index index.html;

    # ──────────────────────────────────────────────────────────────
    # BrowserRouter SPA Fallback
    #   /login, /orders/123, /places 등 모든 프론트 경로 →
    #   index.html을 돌려줘서 React Router가 처리하게 함
    #   단, /api/* 는 제외 (백엔드 프록시로 처리)
    # ──────────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 정적 에셋 캐싱 (Vite 빌드 결과: content-hash 파일명)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ──────────────────────────────────────────────────────────────
    # Backend API 프록시
    #   프론트와 백엔드가 같은 도메인을 쓸 때 CORS 이슈 없음
    # ──────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # FastAPI Swagger UI (내부망 전용 — 운영에서는 막을 것)
    location /docs {
        proxy_pass http://127.0.0.1:8000/docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # 보안 헤더
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy        "strict-origin" always;

    # gzip 압축
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;
}
