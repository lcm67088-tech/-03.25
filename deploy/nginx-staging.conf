################################################################################
# PlaceOpt — Nginx 스테이징 설정
#
# 도메인:
#   staging-ops.papainite.co.kr  → 프론트엔드 (React SPA)
#   staging-api.papainite.co.kr  → 백엔드 API (FastAPI :8000)
#
# 전제조건:
#   1. DNS A 레코드: staging-ops.papainite.co.kr → 서버 IP
#   2. DNS A 레코드: staging-api.papainite.co.kr → 서버 IP
#   3. Let's Encrypt 인증서 (certbot):
#      certbot --nginx -d staging-ops.papainite.co.kr -d staging-api.papainite.co.kr
#   4. 프론트엔드 빌드: pnpm run build:staging → frontend/dist/
#   5. 백엔드: uvicorn app.main:app --host 0.0.0.0 --port 8000 (PM2)
#
# 사용법:
#   sudo cp deploy/nginx-staging.conf /etc/nginx/sites-available/placeopt-staging
#   sudo ln -s /etc/nginx/sites-available/placeopt-staging /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
################################################################################


# ─────────────────────────────────────────────────────────────────────────────
# [1] staging-ops.papainite.co.kr — 프론트엔드 SPA
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name staging-ops.papainite.co.kr;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name staging-ops.papainite.co.kr;

    # SSL (certbot이 자동 삽입)
    ssl_certificate     /etc/letsencrypt/live/staging-ops.papainite.co.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging-ops.papainite.co.kr/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # 프론트엔드 빌드 결과물 경로 (pnpm build:staging 후)
    root /home/user/placeopt/frontend/dist;
    index index.html;

    # ── BrowserRouter SPA Fallback ─────────────────────────────────────────
    # /login, /orders/xxx, /places 등 모든 React Router 경로 → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Vite 빌드 정적 에셋 (content-hash 파일명 → 장기 캐싱)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 보안 헤더
    add_header X-Frame-Options        "SAMEORIGIN"    always;
    add_header X-Content-Type-Options "nosniff"       always;
    add_header Referrer-Policy        "strict-origin"  always;

    # gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # 스테이징 접근 제어 (IP 화이트리스트 — 필요 시 활성화)
    # allow 사무실_IP/32;
    # deny all;
}


# ─────────────────────────────────────────────────────────────────────────────
# [2] staging-api.papainite.co.kr — 백엔드 API
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name staging-api.papainite.co.kr;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name staging-api.papainite.co.kr;

    ssl_certificate     /etc/letsencrypt/live/staging-api.papainite.co.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging-api.papainite.co.kr/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # 모든 요청을 FastAPI로 프록시
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # 보안 헤더
    add_header X-Frame-Options        "DENY"          always;
    add_header X-Content-Type-Options "nosniff"       always;

    # CORS preflight는 FastAPI CORSMiddleware가 처리
    # nginx에서 별도 CORS 헤더 추가 불필요

    # gzip
    gzip on;
    gzip_types application/json text/plain;
    gzip_min_length 256;

    # 스테이징 접근 제어 (IP 화이트리스트 — 필요 시 활성화)
    # allow 사무실_IP/32;
    # deny all;
}
